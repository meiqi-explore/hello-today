<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello today - Your Day Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { font-family: 'Noto Sans SC', sans-serif; }
        
        .mood-normal { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #ffffff 100%); --primary: #10b981; --secondary: #34d399; }
        .mood-happy { background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 50%, #ffffff 100%); --primary: #f97316; --secondary: #fb923c; }
        .mood-excited { background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 50%, #ffffff 100%); --primary: #ec4899; --secondary: #f472b6; }
        .mood-sad { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #f0f9ff 100%); --primary: #0ea5e9; --secondary: #38bdf8; }
        
        body { min-height: 100vh; transition: all 0.5s ease; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .habit-card { transition: all 0.3s ease; }
        .habit-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .habit-card.completed { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; }
        .delete-btn { opacity: 0; transition: opacity 0.2s; }
        .habit-card:hover .delete-btn { opacity: 1; }
        .mood-btn { transition: all 0.3s; border: 3px solid transparent; }
        .mood-btn.selected { border-color: var(--primary); transform: scale(1.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .todo-item.completed { opacity: 0.6; text-decoration: line-through; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .hidden { display: none !important; }
        .streak-flame { animation: flicker 1.5s ease-in-out infinite alternate; }
        @keyframes flicker { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
    </style>
</head>
<body class="mood-normal p-4 md:p-8">
    <!-- PIN Lock -->
    <div id="pinLock" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur">
        <div class="glass rounded-3xl p-8 max-w-sm w-full mx-4 text-center">
            <div id="pinSetupSection" class="hidden">
                <i class="fas fa-lock text-5xl mb-4" style="color: var(--primary)"></i>
                <h2 class="text-2xl font-bold mb-2">设置 PIN 码</h2>
                <p class="text-gray-500 mb-6">请设置 4 位数字密码</p>
                <div class="flex justify-center gap-2 mb-6">
                    <input type="password" maxlength="1" class="pin-input w-12 h-12 text-center text-2xl border-2 rounded-lg" data-index="0">
                    <input type="password" maxlength="1" class="pin-input w-12 h-12 text-center text-2xl border-2 rounded-lg" data-index="1">
                    <input type="password" maxlength="1" class="pin-input w-12 h-12 text-center text-2xl border-2 rounded-lg" data-index="2">
                    <input type="password" maxlength="1" class="pin-input w-12 h-12 text-center text-2xl border-2 rounded-lg" data-index="3">
                </div>
                <button onclick="setupPIN()" class="w-full py-3 rounded-xl font-semibold text-white" style="background: var(--primary)">确认设置</button>
            </div>
            
            <div id="pinEnterSection">
                <i class="fas fa-fingerprint text-5xl mb-4" style="color: var(--primary)"></i>
                <h2 class="text-2xl font-bold mb-2">输入 PIN 码</h2>
                <div class="flex justify-center gap-3 mb-8">
                    <div class="pin-dot w-4 h-4 rounded-full border-2" style="border-color: var(--primary)" id="dot0"></div>
                    <div class="pin-dot w-4 h-4 rounded-full border-2" style="border-color: var(--primary)" id="dot1"></div>
                    <div class="pin-dot w-4 h-4 rounded-full border-2" style="border-color: var(--primary)" id="dot2"></div>
                    <div class="pin-dot w-4 h-4 rounded-full border-2" style="border-color: var(--primary)" id="dot3"></div>
                </div>
                <div class="grid grid-cols-3 gap-4 max-w-xs mx-auto mb-6">
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(1)">1</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(2)">2</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(3)">3</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(4)">4</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(5)">5</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(6)">6</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(7)">7</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(8)">8</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(9)">9</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="clearPin()"><i class="fas fa-backspace"></i></button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="enterPin(0)">0</button>
                    <button class="pin-btn w-16 h-16 rounded-full border-2 bg-white/90 text-xl font-bold" onclick="checkPin()"><i class="fas fa-check"></i></button>
                </div>
                <button onclick="forgotPin()" class="text-sm text-gray-500 hover:underline">忘记密码？重置数据</button>
            </div>
        </div>
    </div>

    <!-- Main App (注意：这里只有一个 hidden 类，解锁时会移除) -->
    <div id="mainApp" class="max-w-6xl mx-auto hidden">
        <div class="glass rounded-3xl p-6 md:p-8 mb-6 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2"><i class="fas fa-sparkles mr-2" style="color: var(--primary)"></i>hello today</h1>
                    <p class="text-gray-600" id="currentDate"></p>
                </div>
                <div class="flex gap-6">
                    <div class="text-center"><div class="text-3xl font-bold" style="color: var(--primary)" id="totalHabits">0</div><div class="text-sm text-gray-500">习惯</div></div>
                    <div class="text-center"><div class="text-3xl font-bold text-green-600" id="completedToday">0</div><div class="text-sm text-gray-500">完成</div></div>
                    <div class="text-center"><div class="text-3xl font-bold text-orange-500 streak-flame" id="maxStreak">0</div><div class="text-sm text-gray-500">连击</div></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Mood & Wallpaper -->
                <div class="glass rounded-2xl p-6 shadow-xl">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-face-smile mr-2" style="color: var(--primary)"></i>今日心情 & 壁纸</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="setMood('normal')" class="mood-btn p-4 rounded-2xl bg-gradient-to-br from-green-50 to-green-100 text-left" data-mood="normal">
                                <div class="text-3xl mb-2">😌</div><div class="font-bold text-gray-800 text-sm">平静 peace</div>
                            </button>
                            <button onclick="setMood('happy')" class="mood-btn p-4 rounded-2xl bg-gradient-to-br from-orange-50 to-orange-100 text-left" data-mood="happy">
                                <div class="text-3xl mb-2">😆</div><div class="font-bold text-gray-800 text-sm">开心啦啦啦</div>
                            </button>
                            <button onclick="setMood('excited')" class="mood-btn p-4 rounded-2xl bg-gradient-to-br from-pink-50 to-pink-100 text-left" data-mood="excited">
                                <div class="text-3xl mb-2">🤩</div><div class="font-bold text-gray-800 text-sm">兴奋得想转圈</div>
                            </button>
                            <button onclick="setMood('sad')" class="mood-btn p-4 rounded-2xl bg-gradient-to-br from-sky-50 to-sky-100 text-left" data-mood="sad">
                                <div class="text-3xl mb-2">🌧️</div><div class="font-bold text-gray-800 text-sm">我想一个人静静</div>
                            </button>
                        </div>
                        
                        <div class="wallpaper-section">
                            <input type="file" id="wallpaperInput" accept="image/*" class="hidden" onchange="handleWallpaperUpload(event)">
                            <div id="wallpaperPreview" class="hidden h-48 relative rounded-2xl overflow-hidden group">
                                <img id="wallpaperImage" src="" class="w-full h-full object-cover transition-transform group-hover:scale-105">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                                    <button onclick="document.getElementById('wallpaperInput').click()" class="px-3 py-1 bg-white/20 rounded-full text-white text-sm">更换</button>
                                    <button onclick="removeWallpaper()" class="px-3 py-1 bg-red-500/80 rounded-full text-white text-sm">删除</button>
                                </div>
                            </div>
                            <div id="wallpaperUpload" class="h-48 border-2 border-dashed rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-white/50 transition-all" style="border-color: var(--primary)" onclick="document.getElementById('wallpaperInput').click()">
                                <i class="fas fa-camera text-4xl mb-2" style="color: var(--primary)"></i>
                                <p class="text-gray-600 font-medium text-sm">点击上传今日壁纸</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Habits -->
                <div class="glass rounded-2xl p-6 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold"><i class="fas fa-list-check mr-2" style="color: var(--primary)"></i>习惯打卡</h2>
                        <button onclick="toggleHabitForm()" class="text-sm px-4 py-2 rounded-lg text-white" style="background: var(--primary)"><i class="fas fa-plus mr-1"></i>添加</button>
                    </div>
                    <div id="habitForm" class="hidden mb-4 p-4 bg-gray-50 rounded-xl space-y-3">
                        <input type="text" id="habitName" placeholder="习惯名称" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2" style="--tw-ring-color: var(--primary)">
                        <div class="flex gap-2">
                            <select id="habitIcon" class="flex-1 px-4 py-2 rounded-lg border border-gray-200 bg-white">
                                <option value="fa-person-running">🏃 运动</option>
                                <option value="fa-book-open">📖 阅读</option>
                                <option value="fa-droplet">💧 喝水</option>
                                <option value="fa-sun">☀️ 早起</option>
                                <option value="fa-moon">🌙 早睡</option>
                                <option value="fa-pen">✏️ 写作</option>
                                <option value="fa-code">💻 编程</option>
                                <option value="fa-music">🎵 音乐</option>
                                <option value="fa-heart">❤️ 冥想</option>
                            </select>
                            <select id="habitColor" class="flex-1 px-4 py-2 rounded-lg border border-gray-200 bg-white">
                                <option value="indigo">💜 靛蓝</option>
                                <option value="rose">🩷 玫瑰</option>
                                <option value="amber">💛 琥珀</option>
                                <option value="emerald">💚 翠绿</option>
                                <option value="cyan">🩵 青色</option>
                            </select>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addHabit()" class="flex-1 py-2 rounded-lg text-white" style="background: var(--primary)">确认</button>
                            <button onclick="toggleHabitForm()" class="flex-1 py-2 rounded-lg border border-gray-300 text-gray-600">取消</button>
                        </div>
                    </div>
                    <div id="habitsList" class="space-y-3"></div>
                </div>

                <!-- Chart -->
                <div class="glass rounded-2xl p-6 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold"><i class="fas fa-chart-line mr-2" style="color: var(--primary)"></i>统计趋势</h2>
                        <select id="chartPeriod" onchange="updateChart()" class="px-3 py-1 rounded-lg border border-gray-200 text-sm bg-white">
                            <option value="week">本周</option>
                            <option value="month">本月</option>
                            <option value="year">全年</option>
                        </select>
                    </div>
                    <div class="relative h-64 w-full"><canvas id="statsChart"></canvas></div>
                </div>

                <!-- Heatmap -->
                <div class="glass rounded-2xl p-6 shadow-xl">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-calendar-check mr-2" style="color: var(--primary)"></i>打卡热力图</h2>
                    <div id="heatmap" class="grid grid-cols-7 gap-1 max-w-md mx-auto"></div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="space-y-6">
                <!-- Todo -->
                <div class="glass rounded-2xl p-6 shadow-xl">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-clipboard-list mr-2" style="color: var(--primary)"></i>今日提醒</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="todoInput" placeholder="添加待办..." class="flex-1 px-3 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 text-sm" style="--tw-ring-color: var(--primary)" onkeypress="if(event.key==='Enter') addTodo()">
                        <button onclick="addTodo()" class="px-3 py-2 rounded-lg text-white" style="background: var(--primary)"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="todoList" class="space-y-2 max-h-60 overflow-y-auto"></div>
                </div>

                <!-- Countdown -->
                <div class="glass rounded-2xl p-6 shadow-xl">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-hourglass-half mr-2" style="color: var(--primary)"></i>倒数日</h2>
                    <div class="space-y-2 mb-4">
                        <input type="text" id="countdownTitle" placeholder="事项名称" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                        <input type="date" id="countdownDate" class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm">
                        <button onclick="addCountdown()" class="w-full py-2 rounded-lg text-white text-sm" style="background: var(--primary)">添加</button>
                    </div>
                    <div id="countdownList" class="space-y-3"></div>
                </div>

                <button onclick="exportCSV()" class="w-full py-3 rounded-xl font-semibold text-white shadow-lg flex items-center justify-center gap-2" style="background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%)">
                    <i class="fas fa-file-csv"></i>导出 CSV
                </button>
                <button onclick="lockApp()" class="w-full py-3 rounded-xl border-2 border-gray-300 text-gray-500 hover:bg-gray-50">
                    <i class="fas fa-lock mr-2"></i>锁定应用
                </button>
            </div>
        </div>
    </div>

    <!-- Note Modal -->
    <div id="noteModal" class="modal">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4">
            <h3 class="text-xl font-bold mb-4">添加打卡备注</h3>
            <textarea id="noteInput" rows="4" class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 resize-none" style="border-color: var(--primary)" placeholder="记录今天..."></textarea>
            <div class="flex gap-3 mt-4">
                <button onclick="closeNoteModal()" class="flex-1 py-2 rounded-xl border border-gray-300 text-gray-600">取消</button>
                <button onclick="saveNote()" class="flex-1 py-2 rounded-xl text-white" style="background: var(--primary)">保存打卡</button>
            </div>
        </div>
    </div>

    <script>
        // Data Management
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let moodHistory = JSON.parse(localStorage.getItem('moodHistory')) || {};
        let currentMood = localStorage.getItem('currentMood') || 'normal';
        let pinCode = localStorage.getItem('habitPin') || '';
        let enteredPin = '';
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let countdowns = JSON.parse(localStorage.getItem('countdowns')) || [];
        let currentNoteHabit = null;
        let chartInstance = null;
        let todayWallpaper = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (!pinCode) {
                document.getElementById('pinSetupSection').classList.remove('hidden');
                document.getElementById('pinEnterSection').classList.add('hidden');
            } else {
                document.getElementById('pinSetupSection').classList.add('hidden');
                document.getElementById('pinEnterSection').classList.remove('hidden');
            }
            
            document.querySelectorAll('.pin-input').forEach((input, index) => {
                input.addEventListener('input', function() {
                    if (this.value.length === 1 && index < 3) {
                        document.querySelectorAll('.pin-input')[index + 1].focus();
                    }
                });
            });
        });

        // PIN Functions
        function setupPIN() {
            const inputs = document.querySelectorAll('.pin-input');
            let pin = '';
            inputs.forEach(input => pin += input.value);
            
            if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
                alert('请输入 4 位数字');
                return;
            }
            
            pinCode = pin;
            localStorage.setItem('habitPin', pin);
            alert('PIN 码设置成功！');
            unlockApp();
        }

        function enterPin(num) {
            if (enteredPin.length < 4) {
                enteredPin += num;
                updatePinDots();
            }
        }

        function clearPin() {
            enteredPin = enteredPin.slice(0, -1);
            updatePinDots();
        }

        function updatePinDots() {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById('dot' + i);
                dot.style.background = i < enteredPin.length ? 'var(--primary)' : 'transparent';
            }
        }

        function checkPin() {
            if (enteredPin === pinCode) {
                unlockApp();
            } else {
                alert('密码错误');
                enteredPin = '';
                updatePinDots();
            }
        }

        function forgotPin() {
            if (confirm('忘记密码将清除所有数据，确定吗？')) {
                localStorage.clear();
                location.reload();
            }
        }

        // 关键修复：unlockApp 函数
        function unlockApp() {
            // 隐藏 PIN 界面
            document.getElementById('pinLock').classList.add('hidden');
            // 显示主界面（移除 hidden 类）
            document.getElementById('mainApp').classList.remove('hidden');
            
            const savedWallpaper = localStorage.getItem('todayWallpaper');
            const savedWallpaperDate = localStorage.getItem('todayWallpaperDate');
            const today = getToday();
            
            if (savedWallpaper && savedWallpaperDate === today) {
                todayWallpaper = savedWallpaper;
                document.getElementById('wallpaperUpload').classList.add('hidden');
                document.getElementById('wallpaperPreview').classList.remove('hidden');
                document.getElementById('wallpaperImage').src = todayWallpaper;
            }
            
            setMood(currentMood, false);
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {
                year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
            });
            
            renderHabits();
            updateStats();
            renderHeatmap();
            renderTodos();
            renderCountdowns();
            initChart();
        }

        // 关键修复：lockApp 函数
        function lockApp() {
            enteredPin = '';
            updatePinDots();
            document.getElementById('pinLock').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }

        // Wallpaper
        function handleWallpaperUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                alert('图片太大，请选择小于 5MB 的照片');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                todayWallpaper = e.target.result;
                localStorage.setItem('todayWallpaper', todayWallpaper);
                localStorage.setItem('todayWallpaperDate', getToday());
                document.getElementById('wallpaperUpload').classList.add('hidden');
                document.getElementById('wallpaperPreview').classList.remove('hidden');
                document.getElementById('wallpaperImage').src = todayWallpaper;
            };
            reader.readAsDataURL(file);
        }

        function removeWallpaper() {
            if (confirm('确定删除今日壁纸吗？')) {
                todayWallpaper = null;
                localStorage.removeItem('todayWallpaper');
                localStorage.removeItem('todayWallpaperDate');
                document.getElementById('wallpaperUpload').classList.remove('hidden');
                document.getElementById('wallpaperPreview').classList.add('hidden');
            }
        }

        // Mood
        function setMood(mood, save = true) {
            currentMood = mood;
            document.body.className = `mood-${mood} p-4 md:p-8`;
            
            document.querySelectorAll('.mood-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.mood === mood);
            });
            
            const today = getToday();
            moodHistory[today] = mood;
            
            if (save) {
                localStorage.setItem('currentMood', mood);
                localStorage.setItem('moodHistory', JSON.stringify(moodHistory));
            }
            
            renderHabits();
            if (chartInstance) updateChart();
        }

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function getStreak(habit) {
            let streak = 0;
            const today = new Date();
            const dates = Object.keys(habit.checks).sort().reverse();
            
            for (let i = 0; i < dates.length; i++) {
                const checkDate = new Date(dates[i]);
                const diffDays = Math.floor((today - checkDate) / (1000 * 60 * 60 * 24));
                if (diffDays === streak) {
                    streak++;
                } else if (diffDays > streak) {
                    break;
                }
            }
            return streak;
        }

        function updateStats() {
            document.getElementById('totalHabits').textContent = habits.length;
            const today = getToday();
            let completed = 0;
            habits.forEach(h => { if (h.checks[today]?.completed) completed++; });
            document.getElementById('completedToday').textContent = completed;
            
            let maxStreak = 0;
            habits.forEach(h => {
                const streak = getStreak(h);
                if (streak > maxStreak) maxStreak = streak;
            });
            document.getElementById('maxStreak').textContent = maxStreak;
        }

        function saveData() {
            localStorage.setItem('habits', JSON.stringify(habits));
            updateStats();
            renderHeatmap();
            updateChart();
        }

        // Habits
        function toggleHabitForm() {
            document.getElementById('habitForm').classList.toggle('hidden');
        }

        function addHabit() {
            const name = document.getElementById('habitName').value.trim();
            const icon = document.getElementById('habitIcon').value;
            const color = document.getElementById('habitColor').value;
            
            if (!name) {
                alert('请输入习惯名称');
                return;
            }
            
            habits.push({
                id: Date.now(),
                name: name,
                icon: icon,
                color: color,
                checks: {},
                createdAt: new Date().toISOString()
            });
            
            document.getElementById('habitName').value = '';
            toggleHabitForm();
            saveData();
            renderHabits();
        }

        function renderHabits() {
            const container = document.getElementById('habitsList');
            const today = getToday();
            
            if (habits.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="fas fa-clipboard-list text-4xl mb-2"></i><p>还没有习惯，点击上方按钮添加</p></div>';
                return;
            }
            
            const colorClasses = {
                indigo: 'bg-indigo-100 text-indigo-600',
                rose: 'bg-rose-100 text-rose-600',
                amber: 'bg-amber-100 text-amber-600',
                emerald: 'bg-emerald-100 text-emerald-600',
                cyan: 'bg-cyan-100 text-cyan-600'
            };
            
            container.innerHTML = habits.map((habit, index) => {
                const checkData = habit.checks[today] || { completed: false, note: '' };
                const isCompleted = checkData.completed;
                const note = checkData.note || '';
                const streak = getStreak(habit);
                
                return `
                    <div class="habit-card glass rounded-2xl p-4 relative ${isCompleted ? 'completed' : ''}">
                        <button onclick="deleteHabit(${index})" class="delete-btn absolute top-2 right-2 w-6 h-6 flex items-center justify-center rounded-full hover:bg-red-500 hover:text-white text-gray-400 text-xs">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="flex items-start gap-3">
                            <div class="w-12 h-12 rounded-xl ${isCompleted ? 'bg-white/30' : colorClasses[habit.color]} flex items-center justify-center text-xl flex-shrink-0">
                                <i class="fas ${habit.icon}"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold ${isCompleted ? 'text-white' : 'text-gray-800'}">${habit.name}</h3>
                                    <span class="text-xs ${isCompleted ? 'text-white/80' : 'text-gray-500'}"><i class="fas fa-fire ${streak > 0 ? 'text-orange-400' : ''}"></i> ${streak}天</span>
                                </div>
                                ${note ? `<p class="text-sm ${isCompleted ? 'text-white/90' : 'text-gray-600'} mt-1 truncate">${note}</p>` : ''}
                                <div class="flex gap-2 mt-2">
                                    <button onclick="openNoteModal(${index})" class="text-xs px-2 py-1 rounded-md ${isCompleted ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-600'}">${isCompleted ? '查看备注' : '打卡 + 备注'}</button>
                                    ${isCompleted ? `<button onclick="toggleHabitCheck(${index})" class="text-xs px-2 py-1 rounded-md bg-white/20 text-white">取消</button>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function deleteHabit(index) {
            if (confirm('确定删除这个习惯吗？')) {
                habits.splice(index, 1);
                saveData();
                renderHabits();
            }
        }

        function openNoteModal(index) {
            currentNoteHabit = index;
            const habit = habits[index];
            const today = getToday();
            const existingNote = habit.checks[today]?.note || '';
            document.getElementById('noteInput').value = existingNote;
            document.getElementById('noteModal').classList.add('active');
        }

        function closeNoteModal() {
            document.getElementById('noteModal').classList.remove('active');
            currentNoteHabit = null;
        }

        function saveNote() {
            if (currentNoteHabit === null) return;
            const note = document.getElementById('noteInput').value.trim();
            const today = getToday();
            
            habits[currentNoteHabit].checks[today] = {
                completed: true,
                note: note,
                timestamp: new Date().toISOString()
            };
            
            saveData();
            renderHabits();
            closeNoteModal();
        }

        function toggleHabitCheck(index) {
            const today = getToday();
            if (habits[index].checks[today]) {
                delete habits[index].checks[today];
            } else {
                habits[index].checks[today] = { completed: true, note: '', timestamp: new Date().toISOString() };
            }
            saveData();
            renderHabits();
        }

        // Chart
        function initChart() {
            const ctx = document.getElementById('statsChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: getChartData('week'),
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function getChartData(period) {
            const labels = [];
            const data = [];
            const today = new Date();
            
            if (period === 'week') {
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    labels.push(d.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' }));
                    let count = 0;
                    habits.forEach(h => { if (h.checks[dateStr]?.completed) count++; });
                    data.push(count);
                }
            } else if (period === 'month') {
                for (let i = 29; i >= 0; i -= 3) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    labels.push(d.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' }));
                    let count = 0;
                    habits.forEach(h => { if (h.checks[dateStr]?.completed) count++; });
                    data.push(count);
                }
            } else {
                for (let i = 11; i >= 0; i--) {
                    const d = new Date(today);
                    d.setMonth(d.getMonth() - i);
                    labels.push(d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'numeric' }));
                    let count = 0;
                    habits.forEach(h => {
                        Object.keys(h.checks).forEach(date => {
                            if (date.startsWith(d.toISOString().slice(0, 7)) && h.checks[date].completed) count++;
                        });
                    });
                    data.push(count);
                }
            }
            
            return {
                labels: labels,
                datasets: [{
                    label: '打卡数',
                    data: data,
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            };
        }

        function updateChart() {
            if (!chartInstance) return;
            const period = document.getElementById('chartPeriod').value;
            chartInstance.data = getChartData(period);
            chartInstance.update();
        }

        // Heatmap
        function renderHeatmap() {
            const container = document.getElementById('heatmap');
            const days = 28;
            const today = new Date();
            let html = '';
            
            for (let i = days - 1; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                
                let count = 0;
                habits.forEach(h => { if (h.checks[dateStr]?.completed) count++; });
                
                let opacity = count === 0 ? 0.1 : Math.min(count / Math.max(habits.length, 1), 1) * 0.8 + 0.2;
                
                html += `<div class="aspect-square rounded cursor-pointer hover:scale-110 transition-transform" style="background: var(--primary); opacity: ${opacity}" title="${dateStr}: ${count}个习惯"></div>`;
            }
            
            container.innerHTML = html;
        }

        // Todo
        function renderTodos() {
            const container = document.getElementById('todoList');
            const today = getToday();
            const todayTodos = todos.filter(t => t.date === today);
            
            if (todayTodos.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">暂无待办事项</p>';
                return;
            }
            
            container.innerHTML = todayTodos.map((todo) => `
                <div class="todo-item flex items-center gap-2 p-2 rounded-lg ${todo.completed ? 'completed bg-gray-50' : 'bg-white'} border border-gray-100">
                    <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo(${todos.indexOf(todo)})" style="border-color: var(--primary); ${todo.completed ? 'background: var(--primary)' : ''}">
                        ${todo.completed ? '<i class="fas fa-check text-xs text-white"></i>' : ''}
                    </div>
                    <span class="flex-1 text-sm ${todo.completed ? 'text-gray-400' : 'text-gray-700'}">${todo.text}</span>
                    <button onclick="deleteTodo(${todos.indexOf(todo)})" class="text-gray-400 hover:text-red-500 text-xs"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return;
            
            todos.push({ id: Date.now(), text: text, completed: false, date: getToday() });
            input.value = '';
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
        }

        function toggleTodo(index) {
            todos[index].completed = !todos[index].completed;
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            localStorage.setItem('todos', JSON.stringify(todos));
            renderTodos();
        }

        // Countdown
        function renderCountdowns() {
            const container = document.getElementById('countdownList');
            const today = new Date();
            today.setHours(0,0,0,0);
            
            if (countdowns.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">暂无倒数日</p>';
                return;
            }
            
            countdowns.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            container.innerHTML = countdowns.map((item, index) => {
                const target = new Date(item.date);
                target.setHours(0,0,0,0);
                const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
                
                let statusText = diffDays < 0 ? '已过期' : diffDays === 0 ? '就是今天！' : `还有 ${diffDays} 天`;
                let statusClass = diffDays === 0 ? 'text-red-500 font-bold' : 'text-gray-600';
                
                return `
                    <div class="bg-white/80 rounded-xl p-3 relative border-l-4" style="border-color: var(--primary)">
                        <button onclick="deleteCountdown(${index})" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-xs"><i class="fas fa-times"></i></button>
                        <div class="flex items-center gap-3">
                            <div class="text-2xl font-bold" style="color: var(--primary)">${Math.abs(diffDays)}</div>
                            <div class="flex-1">
                                <div class="font-medium text-gray-800 text-sm">${item.title}</div>
                                <div class="text-xs ${statusClass}">${statusText}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addCountdown() {
            const title = document.getElementById('countdownTitle').value.trim();
            const date = document.getElementById('countdownDate').value;
            
            if (!title || !date) {
                alert('请输入事项名称和日期');
                return;
            }
            
            countdowns.push({ id: Date.now(), title: title, date: date });
            document.getElementById('countdownTitle').value = '';
            document.getElementById('countdownDate').value = '';
            localStorage.setItem('countdowns', JSON.stringify(countdowns));
            renderCountdowns();
        }

        function deleteCountdown(index) {
            countdowns.splice(index, 1);
            localStorage.setItem('countdowns', JSON.stringify(countdowns));
            renderCountdowns();
        }

        // Export CSV
        function exportCSV() {
            let csv = '日期,心情,壁纸,';
            habits.forEach(h => csv += h.name + ',');
            csv += '完成总数,备注\n';
            
            const allDates = new Set();
            habits.forEach(h => Object.keys(h.checks).forEach(date => allDates.add(date)));
            
            Array.from(allDates).sort().reverse().forEach(date => {
                const mood = moodHistory[date] || 'normal';
                const moodEmoji = {normal: '😌', happy: '😆', excited: '🤩', sad: '🌧️'}[mood];
                const hasWallpaper = (date === getToday() && todayWallpaper) ? '有' : '无';
                
                csv += date + ',' + moodEmoji + ',' + hasWallpaper + ',';
                
                let dayCount = 0;
                let dayNotes = [];
                habits.forEach(h => {
                    if (h.checks[date]?.completed) {
                        csv += '✓,';
                        dayCount++;
                        if (h.checks[date].note) dayNotes.push(h.name + ': ' + h.checks[date].note);
                    } else {
                        csv += ',';
                    }
                });
                
                csv += dayCount + ',"' + dayNotes.join('; ') + '"\n';
            });
            
            csv += '\n待办事项\n日期,内容,状态\n';
            todos.forEach(t => csv += `${t.date},${t.text},${t.completed ? '已完成' : '未完成'}\n`);
            
            csv += '\n倒数日\n事项,日期\n';
            countdowns.forEach(c => csv += `${c.title},${c.date}\n`);
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'hello_today_' + new Date().toLocaleDateString('zh-CN') + '.csv';
            link.click();
            
            alert('导出成功！');
        }
    </script>
</body>
</html>
